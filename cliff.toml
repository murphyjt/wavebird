# git-cliff configuration — generates release notes from conventional commits.

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
## {{ group }}

{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "✨ Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "🚀 Performance" },
  { message = "^refactor", group = "♻️ Refactor" },
  { message = "^docs", group = "📝 Documentation" },
  { message = "^test", group = "✅ Tests" },
  { message = "^build", group = "🏗️ Build" },
  { message = "^ci", group = "🤖 CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "🧹 Chores" },
  { message = "^style", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"
