name: Release

# Required repository secrets:
#   APPLE_CERTIFICATE_P12_BASE64       — Developer ID Application cert (.p12) base64-encoded
#   APPLE_CERTIFICATE_PASSWORD         — password used when exporting the p12
#   APPLE_PROVISIONING_PROFILE_BASE64  — Developer ID provisioning profile, base64-encoded
#   APPLE_TEAM_ID                      — 10-char team ID from developer.apple.com
#   APPLE_ID                           — Apple ID email used for notarization
#   APPLE_APP_SPECIFIC_PASSWORD        — app-specific password from appleid.apple.com
#   KEYCHAIN_PASSWORD                  — any string; gates the temporary keychain

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write       # create release + upload assets
  id-token: write       # required by attest-build-provenance
  attestations: write   # write the SLSA attestation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # git-cliff needs full history + tags

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/wavebird.provisionprofile"
          # Extract and print the profile name + UUID for verification.
          security cms -D -i "$PROFILE_DIR/wavebird.provisionprofile" \
            | plutil -extract Name xml1 -o - - \
            | xmllint --xpath '//string/text()' -

      - name: Build (Release, signed, hardened runtime)
        run: |
          xcodebuild \
            -project WaveBird.xcodeproj \
            -scheme WaveBird \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION=${{ steps.version.outputs.version }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            PROVISIONING_PROFILE_SPECIFIER="WaveBird Developer ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            build

      - name: Re-sign with explicit entitlements
        run: |
          APP_PATH="build/Build/Products/Release/WaveBird.app"
          codesign --force \
            --sign "Developer ID Application" \
            --options runtime \
            --timestamp \
            --entitlements WaveBird/WaveBird.entitlements \
            "$APP_PATH"
          echo "Signed entitlements:"
          codesign -d --entitlements :- "$APP_PATH"

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 \
            build/Build/Products/Release/WaveBird.app

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          APP_PATH="build/Build/Products/Release/WaveBird.app"
          ZIP_PATH="WaveBird.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          RESULT=$(xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait \
            --output-format json)
          echo "$RESULT"
          STATUS=$(echo "$RESULT" | jq -r '.status')
          ID=$(echo "$RESULT" | jq -r '.id')
          if [[ "$STATUS" != "Accepted" ]]; then
            echo "::error::Notarization failed: $STATUS"
            echo "::group::Notarization log"
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD"
            echo "::endgroup::"
            exit 1
          fi
          xcrun stapler staple "$APP_PATH"

      - name: Stage app
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/WaveBird.app dist/

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: |
          create-dmg \
            --volname "WaveBird ${{ steps.version.outputs.version }}" \
            --window-size 540 360 \
            --icon-size 100 \
            --icon "WaveBird.app" 140 180 \
            --app-drop-link 400 180 \
            "dist/WaveBird-${{ steps.version.outputs.version }}.dmg" \
            "dist/WaveBird.app"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" --timestamp \
            "dist/WaveBird-${{ steps.version.outputs.version }}.dmg"

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          DMG="dist/WaveBird-${{ steps.version.outputs.version }}.dmg"
          RESULT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait \
            --output-format json)
          echo "$RESULT"
          STATUS=$(echo "$RESULT" | jq -r '.status')
          ID=$(echo "$RESULT" | jq -r '.id')
          if [[ "$STATUS" != "Accepted" ]]; then
            echo "::error::DMG notarization failed: $STATUS"
            echo "::group::Notarization log"
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD"
            echo "::endgroup::"
            exit 1
          fi
          xcrun stapler staple "$DMG"
          spctl --assess --type open --context context:primary-signature -vv "$DMG"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/WaveBird-${{ steps.version.outputs.version }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveBird-${{ steps.version.outputs.version }}
          path: dist/WaveBird-${{ steps.version.outputs.version }}.dmg

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/')
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: changelog.md

      - name: Compose release body
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n1 || true)
          {
            echo "## Install"
            echo
            echo "1. Download \`WaveBird-${VERSION}.dmg\` below."
            echo "2. Open the DMG and drag \`WaveBird.app\` to \`/Applications\`."
            echo
            echo "Signed and notarized by Apple — no Gatekeeper warning."
            echo
            echo "## Provenance"
            echo
            echo "Verify the build provenance with the GitHub CLI:"
            echo
            echo '```sh'
            echo "gh attestation verify --repo ${REPO} WaveBird-${VERSION}.dmg"
            echo '```'
            echo
            cat changelog.md
            if [[ -n "$PREV_TAG" ]]; then
              echo
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
            fi
          } > release-body.md
          echo "::group::release-body.md"
          cat release-body.md
          echo "::endgroup::"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WaveBird-${{ steps.version.outputs.version }}.dmg
          body_path: release-body.md
          fail_on_unmatched_files: true
